<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login</title>


    <!-- Font Awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Font Intrigation -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:italwght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1900&display=swap"
        rel="stylesheet">

    <!-- Tailwind + Daisy Ui -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <!-- Stylesheet -->

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="login-container min-h-screen flex items-center justify-center">

        <div class="bg-white shadow-lg rounded-lg w-full max-w-md p-6">

            <!-- Header -->
            <div class="header-top">
                <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16 mx-auto mb-4">
                <h2 class="text-center font-semibold text-[24px]">GitHub Issues Tracker</h2>
                <p class="text-center text-[16px] font-normal">Sign in to manage your issues</p>
            </div>

            <!-- Form -->
            <div class="space-y-4 mt-6 items-center justify-center">

                <fieldset class="fieldset border-base-300 rounded-box p-4 items-center">

                    <label class="label text-[16px] text-[#101317] font-medium">Username</label>
                    <input type="email" id="username" class="input w-full" placeholder="Enter Username" <input/>
                    <p class="text-[14px] text-[#4A00FF] pb-4">Default: admin</p>

                    <label class="label text-[16px] text-[#101317] font-medium id">Password</label>
                    <input type="password" id="password" class="input w-full" placeholder="Enter Password" <input/>
                    <p class="text-[14px] text-[#4A00FF]">Default: admin123</p>

                    <button onclick="login()" class="btn btn-primary mt-4 rounded-lg">Sign In</button>
                </fieldset>

            </div>

            <!-- Horizental Line -->
            <div class="divider text-semi-bold max-w-md p-4">OR</div>

            <!-- Demo Credentials: -->
            <div class="text-center text-sm text-gray-600">
                <p class="pt-4 pb-2">Demo Credentials:</p>
                <div class=" flex flex-col w-full h-[90px] rounded-lg bg-[#F8FAFC] items-center justify-center p-[16px] text-center">
                    <p class="font-medium ">Username: admin</p>
                    <p class="font-medium ">Password: admin123</p>
                </div>
            </div>

    </section>
    
    
    <!-- link -->
    <script src="script.js"></script>
    <script src="./login.js"></script> 

</body>

</html>
